<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Спок Тренировки</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            padding: 25px;
        }
        h1, h2 {
            text-align: center;
            color: #1e2a3a;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 16px;
            background: white;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .gender-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .gender-btn {
            width: auto;
            padding: 12px 30px;
            margin-top: 0;
        }
        .back-btn {
            background: #ff9800;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .icon-btn {
            width: auto;
            margin-top: 0;
            padding: 8px 16px;
            font-size: 14px;
        }
        .selector-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .selector-group select {
            flex: 1;
        }
        .selector-group span {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
        }
        .exercise-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .exercise-name {
            font-weight: bold;
            font-size: 18px;
        }
        .delete-exercise {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .input-group .field {
            flex: 1;
            min-width: 80px;
        }
        .field small {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .app-container {
                padding: 20px;
            }
            .gender-btn {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div id="authScreen">
        <h2>🔐 Вход / Регистрация</h2>
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="login" placeholder="придумайте логин">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="придумайте пароль">
        </div>
        <button id="loginBtn">Войти</button>
        <button id="registerBtn" class="back-btn">Зарегистрироваться</button>
    </div>

    <div id="genderScreen" style="display: none;">
        <h2>👋 Привет! Выбери свой пол</h2>
        <div class="gender-buttons">
            <button class="gender-btn" data-gender="male">♂️ Мужчина</button>
            <button class="gender-btn" data-gender="female">♀️ Женщина</button>
        </div>
    </div>

    <div id="profileScreen" style="display: none;">
        <h2>📝 Расскажи о себе</h2>
        <div class="form-group">
            <label>Рост (см)</label>
            <input type="number" id="height" min="1" step="1" placeholder="например, 175">
        </div>
        <div class="form-group">
            <label>Вес (кг)</label>
            <input type="number" id="weight" min="1" step="1" placeholder="например, 80">
        </div>
        <div class="form-group">
            <label>Возраст</label>
            <input type="number" id="age" min="1" step="1" placeholder="например, 30">
        </div>
        <div class="form-group">
            <label>Уровень подготовки</label>
            <select id="level">
                <option value="beginner">Новичок</option>
                <option value="intermediate">Средний</option>
                <option value="advanced">Профи</option>
            </select>
        </div>
        <div class="form-group">
            <label>Цель тренировок</label>
            <select id="goal">
                <option value="strength">Увеличение силы</option>
                <option value="muscle_gain">Набор мышечной массы</option>
                <option value="weight_loss">Похудение / снижение веса</option>
                <option value="maintenance">Поддержание формы</option>
            </select>
        </div>
        <button id="saveProfileBtn" disabled>Сохранить и продолжить</button>
        <button id="backToGenderBtn" class="back-btn">⬅ Назад (сменить пол)</button>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="top-bar">
            <h1>🏋️ Спок Тренировки</h1>
            <div>
                <button id="historyBtn" class="icon-btn">📋 История</button>
                <button id="logoutBtn" class="icon-btn back-btn">🚪 Выйти</button>
            </div>
        </div>
        <div class="selector-group">
            <select id="muscle1">
                <option value="chest">Грудь</option>
                <option value="back">Спина</option>
                <option value="legs">Ноги</option>
                <option value="shoulders">Плечи</option>
                <option value="biceps">Бицепс</option>
                <option value="triceps">Трицепс</option>
            </select>
            <span>+</span>
            <select id="muscle2">
                <option value="chest">Грудь</option>
                <option value="back">Спина</option>
                <option value="legs">Ноги</option>
                <option value="shoulders">Плечи</option>
                <option value="biceps">Бицепс</option>
                <option value="triceps">Трицепс</option>
            </select>
            <button id="applyBtn">Применить</button>
        </div>
        <div id="exercises-container"></div>
        <button id="addExerciseBtn">➕ Добавить упражнение</button>
        <button id="saveBtn">💾 Сохранить тренировку</button>
    </div>
</div>

<script>
    let currentUser = null;
    let currentGender = null;
    let userProfile = {};
    let currentMuscle1 = 'chest';
    let currentMuscle2 = 'triceps';
    let exercises = [];

    const maleLibrary = {
        chest: ["Жим штанги лёжа", "Жим гантелей лёжа", "Разводка гантелей", "Отжимания на брусьях", "Жим в хаммере"],
        back: ["Тяга верхнего блока", "Тяга штанги в наклоне", "Горизонтальная тяга", "Подтягивания", "Тяга гантели одной рукой"],
        legs: ["Приседания со штангой", "Жим ногами", "Разгибание ног", "Сгибание ног", "Выпады с гантелями"],
        shoulders: ["Жим гантелей сидя", "Жим штанги стоя", "Махи в стороны", "Махи в наклоне", "Шраги"],
        biceps: ["Подъём штанги на бицепс", "Молоточки", "Концентрированный подъём", "Подъём на скамье Скотта", "Обратный хват"],
        triceps: ["Разгибание на блоке", "Кикбэк", "Французский жим", "Отжимания на брусьях (узко)", "Жим лёжа узким хватом"]
    };
    const femaleLibrary = {
        chest: ["Жим гантелей лёжа (лёгкий)", "Сведение рук в кроссовере", "Отжимания от пола с колен", "Жим от груди сидя", "Пуловер с гантелью"],
        back: ["Тяга верхнего блока", "Горизонтальная тяга", "Тяга гантели к поясу", "Гиперэкстензия", "Подтягивания с поддержкой"],
        legs: ["Приседания с гантелями", "Ягодичный мостик", "Разгибание ног", "Сгибание ног", "Выпады назад"],
        shoulders: ["Жим гантелей сидя (лёгкий)", "Махи в стороны", "Махи перед собой", "Махи в наклоне", "Шраги с гантелями"],
        biceps: ["Подъём гантелей на бицепс", "Молоточки", "Концентрированный подъём", "Подъём на скамье Скотта (лёгкий)", "Обратный хват с резиной"],
        triceps: ["Разгибание на блоке", "Кикбэк с гантелью", "Французский жим лёжа (лёгкий)", "Отжимания от скамьи", "Жим лёжа узким хватом (лёгкий)"]
    };

    function getLibrary() { return currentGender === 'male' ? maleLibrary : femaleLibrary; }

    function generateExercises() {
        const lib = getLibrary();
        let newExercises = [];
        let ex1 = lib[currentMuscle1].slice(0, 3);
        let ex2 = lib[currentMuscle2].slice(0, 3);
        for (let name of ex1) newExercises.push({ name, sets: 0, weight: 0, reps: 0 });
        for (let name of ex2) newExercises.push({ name, sets: 0, weight: 0, reps: 0 });
        return newExercises;
    }

    function render() {
        const container = document.getElementById('exercises-container');
        container.innerHTML = '';
        for (let i = 0; i < exercises.length; i++) {
            const ex = exercises[i];
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.innerHTML = `
                <div class="exercise-header">
                    <span class="exercise-name">${ex.name}</span>
                    <button class="delete-exercise" data-index="${i}">🗑️ Удалить</button>
                </div>
                <div class="input-group">
                    <div class="field">
                        <input type="number" min="0" max="6" step="1" placeholder="Подходы" data-type="sets" data-index="${i}" value="${ex.sets}">
                        <small>подходы (макс.6)</small>
                    </div>
                    <div class="field">
                        <input type="number" min="0" step="0.5" placeholder="Вес (кг)" data-type="weight" data-index="${i}" value="${ex.weight}">
                        <small>вес, кг</small>
                    </div>
                    <div class="field">
                        <input type="number" min="0" step="1" placeholder="Повторения" data-type="reps" data-index="${i}" value="${ex.reps}">
                        <small>повторения</small>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
        document.querySelectorAll('.delete-exercise').forEach(btn => {
            btn.addEventListener('click', (e) => {
                exercises.splice(parseInt(btn.dataset.index), 1);
                render();
            });
        });
        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('change', (e) => {
                const index = parseInt(input.dataset.index);
                const type = input.dataset.type;
                let val = parseFloat(input.value);
                if (isNaN(val)) val = 0;
                if (val < 0) val = 0;
                if (type === 'sets' && val > 6) val = 6;
                if (type === 'sets') exercises[index].sets = val;
                else if (type === 'weight') exercises[index].weight = val;
                else if (type === 'reps') exercises[index].reps = val;
            });
        });
    }

    function applySelection() {
        currentMuscle1 = document.getElementById('muscle1').value;
        currentMuscle2 = document.getElementById('muscle2').value;
        exercises = generateExercises();
        render();
    }

    function saveData() {
        const data = { muscle1: currentMuscle1, muscle2: currentMuscle2, exercises, date: new Date().toISOString() };
        let history = JSON.parse(localStorage.getItem(`trainingsHistory_${currentUser}`) || '[]');
        history.push(data);
        localStorage.setItem(`trainingsHistory_${currentUser}`, JSON.stringify(history));
        localStorage.setItem(`trainingsData_${currentUser}`, JSON.stringify(data));
        alert('Тренировка сохранена!');
    }

    function loadUserData() {
        const saved = localStorage.getItem(`trainingsData_${currentUser}`);
        if (saved) {
            const data = JSON.parse(saved);
            exercises = data.exercises;
            currentMuscle1 = data.muscle1;
            currentMuscle2 = data.muscle2;
            document.getElementById('muscle1').value = currentMuscle1;
            document.getElementById('muscle2').value = currentMuscle2;
        } else {
            exercises = generateExercises();
        }
        render();
    }

    function showHistory() {
        const history = JSON.parse(localStorage.getItem(`trainingsHistory_${currentUser}`) || '[]');
        if (history.length === 0) {
            alert('История пуста. Сначала сохраните тренировку.');
            return;
        }
        let list = '📋 Сохранённые тренировки:\n\n';
        history.forEach((item, idx) => {
            const date = new Date(item.date).toLocaleString();
            list += `${idx+1}. ${date}\n`;
        });
        const num = prompt(list + '\nВведите номер тренировки для деталей:');
        if (num && history[num-1]) {
            const item = history[num-1];
            let details = `📅 ${new Date(item.date).toLocaleString()}\n\n`;
            for (let ex of item.exercises) {
                details += `${ex.name}: ${ex.sets}×${ex.weight}×${ex.reps}\n`;
            }
            alert(details);
        }
    }

    function validateProfile() {
        const height = parseInt(document.getElementById('height').value);
        const weight = parseInt(document.getElementById('weight').value);
        const age = parseInt(document.getElementById('age').value);
        document.getElementById('saveProfileBtn').disabled = !(height > 0 && weight > 0 && age > 0);
    }

    function showGenderScreen() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('genderScreen').style.display = 'block';
        document.getElementById('profileScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'none';
    }

    function showProfileScreen() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('genderScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';
    }

    function showMainApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('genderScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        loadUserData();
    }

    function logout() {
        currentUser = null;
        document.getElementById('authScreen').style.display = 'block';
        document.getElementById('genderScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'none';
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        if (!login || !password) {
            alert('Введите логин и пароль');
            return;
        }
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        if (users[login] && users[login] === password) {
            currentUser = login;
            const savedGender = localStorage.getItem(`gender_${currentUser}`);
            const savedProfile = localStorage.getItem(`profile_${currentUser}`);
            if (savedGender && savedProfile) {
                currentGender = savedGender;
                userProfile = JSON.parse(savedProfile);
                showMainApp();
            } else {
                showGenderScreen();
            }
        } else {
            alert('Неверный логин или пароль');
        }
    });

    document.getElementById('registerBtn').addEventListener('click', () => {
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        if (!login || !password) {
            alert('Введите логин и пароль');
            return;
        }
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        if (users[login]) {
            alert('Пользователь уже существует');
            return;
        }
        users[login] = password;
        localStorage.setItem('users', JSON.stringify(users));
        currentUser = login;
        showGenderScreen();
    });

    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentGender = btn.dataset.gender;
            localStorage.setItem(`gender_${currentUser}`, currentGender);
            showProfileScreen();
        });
    });

    document.getElementById('saveProfileBtn').addEventListener('click', () => {
        const height = parseInt(document.getElementById('height').value);
        const weight = parseInt(document.getElementById('weight').value);
        const age = parseInt(document.getElementById('age').value);
        const level = document.getElementById('level').value;
        const goal = document.getElementById('goal').value;
        if (height > 0 && weight > 0 && age > 0) {
            userProfile = { height, weight, age, level, goal };
            localStorage.setItem(`profile_${currentUser}`, JSON.stringify(userProfile));
            showMainApp();
        }
    });

    document.getElementById('backToGenderBtn').addEventListener('click', showGenderScreen);
    document.getElementById('applyBtn').addEventListener('click', applySelection);
    document.getElementById('saveBtn').addEventListener('click', saveData);
    document.getElementById('historyBtn').addEventListener('click', showHistory);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('addExerciseBtn').addEventListener('click', () => {
        const newName = prompt('Название упражнения:');
        if (newName) exercises.push({ name: newName, sets: 0, weight: 0, reps: 0 });
        render();
    });

    ['height', 'weight', 'age'].forEach(id => {
        const input = document.getElementById(id);
        input.addEventListener('input', validateProfile);
    });

    document.getElementById('authScreen').style.display = 'block';
</script>
</body>
</html>
